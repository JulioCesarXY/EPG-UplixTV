name: Atualizar Playlist UplixTV

on:
  schedule:
    # Executa todos os dias às 06:00 UTC (03:00 no horário de Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite que você execute o script manualmente pelo painel do GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Dá permissão para o bot salvar o arquivo de volta no repositório

    steps:
    - name: Código de checkout
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar o Script de Extração
      run: python extract_uplix.py

    - name: Commitar e dar Push nas alterações
      run: |
        git config --local user.email "104462712+JulioCesarXY@users.noreply.github.com"
        git config --local user.name "JulioCesarXY"
        
        # Verifica se houve mudanças no arquivo para evitar commits vazios
        if git status --porcelain | grep -q "uplixtv_playlist.m3u"; then
          git add uplixtv_playlist.m3u
          git commit -m "CHORE: Atualização automática da playlist [skip ci]"
          git push
        else
          echo "Nenhuma alteração detectada na playlist."
        fi
